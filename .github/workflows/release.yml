name: Build and Release Moodle Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_release:
    name: Build & Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Create ZIP Archive via git archive
        run: |
          git archive --format=zip --prefix=leitbox/ HEAD \
            -o mod_leitbox_${{ github.ref_name }}.zip
          
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: mod_leitbox_${{ github.ref_name }}.zip
          generate_release_notes: true
